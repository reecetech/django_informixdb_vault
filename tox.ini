[tox]
envlist = py39-dj3,py310-dj3,py39-dj4,py310-dj4,py311-dj4,py310-dj5,py311-dj5

[testenv]
deps =
    pylint
    pytest
    pytest-cov
    pytest-django
    pytest-mock
    freezegun

    hvac<1
    pyodbc<5
    django-informixdb~=1.13.0

    dj3: django~=3.2.0
    dj4: Django>=4,<5
    dj5: Django>=5,<6
commands =
    pylint django_informixdb_vault
    pytest -v \
           --cov-report term-missing \
           --cov-fail-under '50' \
           --no-cov-on-fail \
           --cov=django_informixdb_vault
passenv =
    INFORMIXDIR
setenv =
    INFORMIXSQLHOSTS={env:INFORMIXDIR:}/etc/sqlhosts
    LD_LIBRARY_PATH={env:INFORMIXDIR:}/lib/esql
